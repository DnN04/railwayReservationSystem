    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(0, 0, 0, 0.2) 100%);
      }
      .neon-glow-primary {
        box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
      }
      .neon-glow-primary:hover {
        box-shadow: 0 0 35px rgba(188, 19, 254, 0.7);
      }
      .neon-glow-secondary {
        box-shadow: 0 0 15px rgba(0, 245, 255, 0.4);
      }
      .scanning-bar::after {
        content: '';
        position: absolute;
        top: 0; left: -100%; width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.4), transparent);
        animation: scan 3s linear infinite;
      }
      .scan-animation {
        position: relative;
        overflow: hidden;
      }
      .scan-animation::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.2), transparent);
        animation: scan 3s infinite linear;
      }
      .scanline-progress {
        position: relative;
        overflow: hidden;
      }
      .scanline-progress::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.6), transparent);
        animation: scan 2s infinite linear;
      }
      .scan-line {
        height: 2px;
        background: linear-gradient(90deg, transparent, #ebb2ff, transparent);
        position: absolute;
        width: 100%;
        top: 50%;
        left: 0;
        animation: scanLine 2s linear infinite;
      }
      @keyframes scan {
        0% { left: -100%; }
        100% { left: 200%; }
      }
      @keyframes scanLine {
        0% { top: 0%; }
        100% { top: 100%; }
      }
      .mesh-gradient {
        background-color: #050505;
        background-image:
          radial-gradient(at 0% 0%, rgba(188, 19, 254, 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(0, 245, 255, 0.1) 0px, transparent 50%);
      }
      .glass-panel {
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
      }
      .neon-glow:hover {
        box-shadow: 0 0 20px rgba(188, 19, 254, 0.6);
      }
      .bg-mesh {
        background-color: #050505;
        background-image:
          radial-gradient(at 0% 0%, rgba(188, 19, 254, 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(0, 245, 255, 0.15) 0px, transparent 50%);
      }
      .neon-grid {
        background-size: 40px 40px;
        background-image:
          linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      }
      .neon-glow-red {
        text-shadow: 0 0 10px rgba(255, 180, 171, 0.5), 0 0 20px rgba(255, 180, 171, 0.3);
      }
    </style>

    <div id="root"></div>
